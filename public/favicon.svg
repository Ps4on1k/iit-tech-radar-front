<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="radarGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:0.8"/>
    </radialGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#3B82F6" stroke-width="4"/>
  
  <!-- Radar rings -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="#60A5FA" stroke-width="2" opacity="0.6"/>
  <circle cx="50" cy="50" r="24" fill="none" stroke="#93C5FD" stroke-width="2" opacity="0.6"/>
  <circle cx="50" cy="50" r="12" fill="none" stroke="#BFDBFE" stroke-width="2" opacity="0.6"/>
  
  <!-- Radar sweep line -->
  <line x1="50" y1="50" x2="85" y2="30" stroke="#2563EB" stroke-width="3" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="6" fill="#1E40AF"/>
  
  <!-- Technology dots on rings -->
  <circle cx="65" cy="35" r="4" fill="#10B981"/>
  <circle cx="40" cy="28" r="4" fill="#F59E0B"/>
  <circle cx="70" cy="55" r="4" fill="#EF4444"/>
  <circle cx="30" cy="60" r="4" fill="#3B82F6"/>
</svg>
